version: "3.9"

services:
  db:
    image: postgres:15
    container_name: leads_db
    restart: always
    environment:
      POSTGRES_DB: leads_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: leads_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: db
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: leads_db
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: postgres
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
      GENERIC_TIMEZONE: Europe/Uzhgorod
    depends_on:
      - db
    volumes:
      - n8n_data:/home/node/.n8n

  metabase-db:
    image: postgres:16
    container_name: leads_metabase_db
    restart: always
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: metabase_password
    ports:
      - "5434:5432"
    volumes:
      - metabase_db_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: leads_metabase
    restart: always
    depends_on:
      - metabase-db
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: metabase-db
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: metabase
      MB_DB_PASS: metabase_password
      MB_SITE_URL: http://localhost:3000
      MB_ENABLE_EMBEDDING: "true"
      MB_EMBEDDING_SECRET_KEY: your_32_char_secret_here
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data

volumes:
  pgdata:
  n8n_data:
  metabase_db_data:
  metabase_data: